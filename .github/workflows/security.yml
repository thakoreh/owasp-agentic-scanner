name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  self-scan:
    name: OWASP Agentic AI Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run scanner on self (with exclusions)
        id: scan
        # Use CI config to exclude rules/ directory (avoids false positives from regex patterns)
        run: |
          uv run owasp-scan scan src/ \
            --config .owasp-scan-ci.toml \
            --format sarif \
            --output results.sarif || true

          # Check if scan found CRITICAL or HIGH severity issues
          if [ -f results.sarif ]; then
            CRITICAL_COUNT=$(grep -o '"level":"error"' results.sarif | wc -l | tr -d ' ')
            echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT

            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "::error::Found $CRITICAL_COUNT critical/high severity security issues"
            else
              echo "No critical/high severity issues found"
            fi
          else
            echo "critical_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: results.sarif

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sarif-results
          path: results.sarif

      - name: Fail if critical issues found
        if: steps.scan.outputs.critical_count > 0
        run: |
          echo "::error::Security scan failed due to ${{ steps.scan.outputs.critical_count }} critical/high severity findings"
          echo "Review the SARIF results for details"
          exit 1

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Export requirements for scanning
        run: uv export --no-hashes --format requirements-txt > requirements.txt

      - name: Run pip-audit
        continue-on-error: true
        run: |
          uv pip install pip-audit
          uv run pip-audit --desc --requirement requirements.txt || echo "::warning::pip-audit found vulnerabilities or encountered errors"

      - name: Upload requirements artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: requirements
          path: requirements.txt
